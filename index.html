<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Wolfenstein Clone - Raycaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            border: 2px solid #000;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
         /* Fullscreen на мобильных - canvas на весь экран */
         /* Размер canvas управляется через JS (visualViewport API) */
        body.fullscreen canvas {
            border: none;
        }
        body.fullscreen #crosshair {
            display: none !important;
        }
        body.fullscreen #fullscreenBtn {
            display: none !important;
        }
        /* Кнопка полного экрана (только на тач-устройствах) */
        #fullscreenBtn {
            display: none;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        #fullscreenBtn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        /* Crosshair */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
        }
        .crosshair.cross {
            width: 20px;
            height: 20px;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
        }
        .crosshair.cross::before,
        .crosshair.cross::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .crosshair.cross::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        .crosshair.cross::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="crosshair" class="crosshair"></div>
    <button id="fullscreenBtn">⛶ Полный экран</button>
    <script type="module" src="main.js"></script>
    <script>
        // Полноэкранный режим для мобильных устройств
        (function() {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            
            if (isTouchDevice) {
                const btn = document.getElementById('fullscreenBtn');
                let fullscreenAttempted = false;
                
                // Используем visualViewport для правильного размера canvas
                const useVisualViewport = window.visualViewport;
                
                // Перезапускаем resize через window (Game.resizeCanvas сам использует visualViewport)
                function updateCanvasSize() {
                    if (document.body.classList.contains('fullscreen')) {
                        window.dispatchEvent(new Event('resize'));
                    }
                }
                
                // Вход в полноэкранный режим
                function enterFullscreen() {
                    // Для iOS используем webkitRequestFullScreen с режимом FullscreenVideo
                    if (isIOS) {
                        // На iOS requestFullscreen не всегда работает, поэтому
                        // просто скрываем адресную строку через scroll и убираем UI
                        document.body.classList.add('fullscreen');
                        // Прокрутка на 1px вниз для скрытия адресной строки в Safari
                        window.scrollTo(0, 1);
                        setTimeout(() => window.scrollTo(0, 1), 100);
                    } else {
                        // Android и другие устройства
                        const elem = document.documentElement;
                        if (elem.requestFullscreen) {
                            elem.requestFullscreen().then(() => {
                                document.body.classList.add('fullscreen');
                            }).catch(() => {
                                // Fallback если Fullscreen API не сработал
                                document.body.classList.add('fullscreen');
                            });
                        } else if (elem.webkitRequestFullscreen) {
                            elem.webkitRequestFullscreen();
                            document.body.classList.add('fullscreen');
                        } else if (elem.webkitRequestFullScreen) {
                            elem.webkitRequestFullScreen();
                            document.body.classList.add('fullscreen');
                        } else if (elem.msRequestFullscreen) {
                            elem.msRequestFullscreen();
                            document.body.classList.add('fullscreen');
                        } else {
                            document.body.classList.add('fullscreen');
                        }
                    }
                    
                    btn.style.display = 'none';
                    
                    // Обновляем размер canvas после перехода в полноэкранный режим
                    setTimeout(updateCanvasSize, 300);
                }
                
                // Выход из полноэкранного режима
                function exitFullscreen() {
                    document.body.classList.remove('fullscreen');
                    
                    if (document.exitFullscreen) {
                        document.exitFullscreen().catch(() => {});
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.webkitCancelFullScreen) {
                        document.webkitCancelFullScreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    
                    // Обновляем размер canvas после выхода
                    setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
                }
                
                // Автоматический вход при первом касании
                function tryAutoFullscreen(e) {
                    if (!fullscreenAttempted) {
                        fullscreenAttempted = true;
                        enterFullscreen();
                    }
                }
                
                document.addEventListener('touchstart', tryAutoFullscreen, { once: true });
                
                // Кнопка полного экрана
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    enterFullscreen();
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    enterFullscreen();
                }, { passive: false });
                
                // Слушаем изменения visualViewport
                if (useVisualViewport) {
                    useVisualViewport.addEventListener('resize', () => {
                        if (document.body.classList.contains('fullscreen')) {
                            updateCanvasSize();
                        }
                    });
                }
                
                // Слушаем изменение размера окна
                window.addEventListener('resize', () => {
                    if (document.body.classList.contains('fullscreen')) {
                        setTimeout(updateCanvasSize, 100);
                    }
                });
                
                // Слушаем выход из полноэкранного режима
                document.addEventListener('fullscreenchange', () => {
                    if (!document.fullscreenElement) {
                        exitFullscreen();
                    }
                });
                
                document.addEventListener('webkitfullscreenchange', () => {
                    if (!document.webkitFullscreenElement) {
                        exitFullscreen();
                    }
                });
                
                document.addEventListener('webkitfullscreenchange', () => {
                    if (!document.webkitCurrentFullScreenElement) {
                        exitFullscreen();
                    }
                });
            }
        })();
    </script>
</body>
</html>
