<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Wolfenstein Clone - Raycaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            border: 2px solid #000;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        /* Fullscreen на мобильных - canvas на весь экран */
        body.fullscreen canvas {
            border: none;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover;
        }
        /* Кнопка полного экрана (только на тач-устройствах) */
        #fullscreenBtn {
            display: none;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        #fullscreenBtn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        /* Crosshair */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
        }
        .crosshair.cross {
            width: 20px;
            height: 20px;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
        }
        .crosshair.cross::before,
        .crosshair.cross::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .crosshair.cross::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        .crosshair.cross::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="crosshair" class="crosshair"></div>
    <button id="fullscreenBtn">⛶ Полный экран</button>
    <script type="module" src="main.js"></script>
    <script>
        // Полноэкранный режим для мобильных устройств
        (function() {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            
            if (!isTouchDevice) return;
            
            const btn = document.getElementById('fullscreenBtn');
            const canvas = document.getElementById('gameCanvas');
            let fullscreenRequested = false;
            
            // Показываем кнопку
            btn.style.display = 'block';
            
            // Войти в полноэкранный режим
            function enterFullscreen() {
                if (fullscreenRequested) return;
                fullscreenRequested = true;
                
                // Для iOS Safari — используем webkitRequestFullscreen на document.documentElement
                if (isIOS) {
                    document.documentElement.webkitRequestFullscreen?.();
                } else if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {
                        fullscreenRequested = false;
                    });
                }
                
                document.body.classList.add('fullscreen');
                btn.style.display = 'none';
                
                // Обновляем размер canvas после перехода
                setTimeout(() => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    window.dispatchEvent(new Event('resize'));
                }, 100);
            }
            
            // Выйти из полноэкранного режима
            function exitFullscreenHandler() {
                fullscreenRequested = false;
                document.body.classList.remove('fullscreen');
                btn.style.display = 'block';
                btn.textContent = '⛶ Полный экран';
            }
            
            // Слушаем изменения полноэкранного режима
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement) exitFullscreenHandler();
            });
            
            // Кнопка — вход в полноэкранный режим по tap
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                enterFullscreen();
            }, { passive: false });
            
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                enterFullscreen();
            });
            
            // При потере fullscreen (кнопка Esc на Android и т.д.)
            document.addEventListener('webkitfullscreenchange', () => {
                if (!document.webkitFullscreenElement) exitFullscreenHandler();
            });
            
        })();
    </script>
</body>
</html>
