<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Wolfenstein Clone - Raycaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            border: 2px solid #000;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        /* Fullscreen на мобильных - canvas на весь экран */
        body.fullscreen canvas {
            border: none;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover;
        }
        /* Кнопка полного экрана (только на тач-устройствах) */
        #fullscreenBtn {
            display: none;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        #fullscreenBtn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        /* Crosshair */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
        }
        .crosshair.cross {
            width: 20px;
            height: 20px;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
        }
        .crosshair.cross::before,
        .crosshair.cross::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .crosshair.cross::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        .crosshair.cross::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="crosshair" class="crosshair"></div>
    <button id="fullscreenBtn">⛶ Полный экран</button>
    <script type="module" src="main.js"></script>
    <script>
        // Автоматический переход в полноэкранный режим на мобильных
        (function() {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            
            if (isTouchDevice) {
                // Показываем кнопку полного экрана
                const btn = document.getElementById('fullscreenBtn');
                btn.style.display = 'block';
                
                // Функция входа в полный экран
                function enterFullscreen() {
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen().catch(() => {});
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen();
                    } else if (elem.webkitRequestFullScreen) {
                        elem.webkitRequestFullScreen();
                    } else if (elem.msRequestFullscreen) {
                        elem.msRequestFullscreen();
                    }
                }
                
                // Пытаемся автоматически войти в полный экран при первом касании
                let autoFullscreenAttempted = false;
                function tryAutoFullscreen(e) {
                    if (!autoFullscreenAttempted) {
                        autoFullscreenAttempted = true;
                        enterFullscreen();
                        document.body.classList.add('fullscreen');
                        btn.style.display = 'none';
                    }
                }
                
                // Слушаем первое касание для входа в полный экран
                document.addEventListener('touchstart', tryAutoFullscreen, { once: true });
                
                // Кнопка тоже вызывает полный экран
                btn.addEventListener('click', enterFullscreen);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    enterFullscreen();
                });
                
                // при изменении размера/ориентации проверяем fullsceen
                window.addEventListener('resize', () => {
                    if (isFullscreenNow()) {
                        document.body.classList.add('fullscreen');
                    }
                });
            }
            
            function isFullscreenNow() {
                return document.fullscreenElement ||
                       document.webkitFullscreenElement ||
                       document.webkitCurrentFullScreenElement ||
                       document.mozFullScreenElement;
            }
        })();
    </script>
</body>
</html>
